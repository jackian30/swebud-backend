services:
  - type: web
    name: swebudd-backend
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm ci && npm run prisma:generate && npm run build
    startCommand: npm run start:render
    healthCheckPath: /health/live
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_ORIGIN
        sync: false
      - key: ADMIN_ORIGIN
        sync: false
      - key: ALLOW_LOCAL_ORIGINS
        value: "false"
      - key: NATIVE_AUTH_ENABLED
        value: "true"
      - key: NATIVE_APP_ORIGIN
        value: https://localhost
      - key: CLOUDFLARE_TURNSTILE_SECRET_KEY
        sync: false
      - key: MEDIA_STORAGE_DRIVER
        value: s3
      - key: MEDIA_S3_BUCKET
        sync: false
      - key: MEDIA_PUBLIC_BASE_URL
        sync: false
      - key: AWS_REGION
        value: ap-southeast-1
      - key: AWS_S3_ENDPOINT
        sync: false
      - key: AWS_S3_FORCE_PATH_STYLE
        value: "true"
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_IGNORE_TLS
        value: "false"
      - key: SMTP_REQUIRE_TLS
        value: "true"
      - key: SMTP_TLS_REJECT_UNAUTHORIZED
        value: "true"
      - key: MAIL_FROM
        sync: false

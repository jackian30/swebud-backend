services:
  - type: web
    name: swebudd-backend
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm ci && npm run prisma:generate && npm run build
    startCommand: npm run start:render
    healthCheckPath: /health/live
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_ORIGIN
        sync: false
      - key: ALLOW_LOCAL_ORIGINS
        value: "false"
      - key: APP_VERSION
        value: "0.2.2-beta"
      - key: MEDIA_STORAGE_DRIVER
        value: s3
      - key: MEDIA_S3_BUCKET
        sync: false
      - key: MEDIA_PUBLIC_BASE_URL
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_S3_ENDPOINT
        sync: false
      - key: AWS_S3_FORCE_PATH_STYLE
        value: "true"
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        value: "SweBudd <no-reply@localhost>"

services:
  - type: web
    name: swebudd-backend
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health/ready
    autoDeployTrigger: checksPass
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: SWEBUDD_RENDER_ORIGIN_COMPAT
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_ORIGIN
        value: https://swebudd.com
      - key: ADMIN_ORIGIN
        # Compatibility alias for a deliberately redeployed v0.2.43 target,
        # which predates NATIVE_APP_ORIGIN. Current startup clears it.
        value: https://localhost
      - key: ALLOW_LOCAL_ORIGINS
        value: "false"
      - key: NATIVE_AUTH_ENABLED
        value: "true"
      - key: NATIVE_APP_ORIGIN
        value: https://localhost
      # Set true only to stop native CORS/session transport during an incident.
      - key: SWEBUDD_NATIVE_AUTH_EMERGENCY_DISABLED
        value: "false"
      # Temporary bridge for Android <=0.2.68, which predates native Turnstile.
      - key: LEGACY_NATIVE_AUTH_COMPAT_UNTIL
        value: "2026-10-01T00:00:00.000Z"
      # Temporary bridge for already-running pre-cookie browser bundles.
      - key: LEGACY_WEB_AUTH_COMPAT_UNTIL
        value: "2026-10-01T00:00:00.000Z"
      - key: CLOUDFLARE_TURNSTILE_SECRET_KEY
        sync: false
      - key: MEDIA_STORAGE_DRIVER
        value: s3
      - key: MEDIA_S3_BUCKET
        sync: false
      - key: MEDIA_PUBLIC_BASE_URL
        sync: false
      - key: AWS_REGION
        value: ap-southeast-1
      - key: AWS_S3_ENDPOINT
        sync: false
      - key: AWS_S3_FORCE_PATH_STYLE
        value: "true"
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_IGNORE_TLS
        value: "false"
      - key: SMTP_REQUIRE_TLS
        value: "true"
      - key: SMTP_TLS_REJECT_UNAUTHORIZED
        value: "true"
      - key: MAIL_FROM
        sync: false

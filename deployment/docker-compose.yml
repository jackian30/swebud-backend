services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-swebud}
      POSTGRES_USER: ${POSTGRES_USER:-swebud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-swebud}
    ports:
      - "5432:5432"
    volumes:
      - swebud_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-swebud} -d ${POSTGRES_DB:-swebud}"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog:v1.0.1
    restart: unless-stopped
    ports:
      - "${MAILHOG_SMTP_PORT:-1026}:1025"
      - "${MAILHOG_UI_PORT:-8026}:8025"

  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:-postgresql://swebud:swebud@postgres:5432/swebud?schema=public}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-too}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-https://swebud.loc}
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      MAIL_FROM: ${MAIL_FROM:-SweBud <no-reply@swebud.loc>}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-https://swebud.loc/api/auth/google/callback}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-https://swebud.loc/auth/google/callback}
      CLOUDFLARE_TURNSTILE_SECRET_KEY: ${CLOUDFLARE_TURNSTILE_SECRET_KEY:-}
      CLOUDFLARE_TURNSTILE_SITE_KEY: ${CLOUDFLARE_TURNSTILE_SITE_KEY:-}
      TENOR_API_KEY: ${TENOR_API_KEY:-}
      TENOR_CLIENT_KEY: ${TENOR_CLIENT_KEY:-swebud-local}
      APP_VERSION: ${APP_VERSION:-0.1.2-beta}
      LEGAL_TERMS_URL: ${LEGAL_TERMS_URL:-}
      LEGAL_PRIVACY_URL: ${LEGAL_PRIVACY_URL:-}
      STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID:-}
      STRAVA_CLIENT_SECRET: ${STRAVA_CLIENT_SECRET:-}
      STRAVA_WEBHOOK_VERIFY_TOKEN: ${STRAVA_WEBHOOK_VERIFY_TOKEN:-}
      GARMIN_CONSUMER_KEY: ${GARMIN_CONSUMER_KEY:-}
      GARMIN_CONSUMER_SECRET: ${GARMIN_CONSUMER_SECRET:-}
    command: sh -c "node dist/src/main.js"
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    volumes:
      - swebud_uploads:/app/uploads

  frontend:
    build:
      context: ../../swebud-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${API_BASE_URL:-/api}
        VITE_MAP_STYLE_URL: ${MAP_STYLE_URL:-https://tiles.openfreemap.org/styles/liberty}
        VITE_CLOUDFLARE_TURNSTILE_SITE_KEY: ${VITE_CLOUDFLARE_TURNSTILE_SITE_KEY:-${CLOUDFLARE_TURNSTILE_SITE_KEY:-}}
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
        VITE_TENOR_API_KEY: ${TENOR_API_KEY:-}
        VITE_APP_VERSION: ${APP_VERSION:-0.1.2-beta}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      API_BASE_URL: ${API_BASE_URL:-/api}
      MAP_STYLE_URL: ${MAP_STYLE_URL:-https://tiles.openfreemap.org/styles/liberty}
      BACKEND_UPSTREAM: ${BACKEND_UPSTREAM:-http://backend:3000}
      CLOUDFLARE_TURNSTILE_SITE_KEY: ${VITE_CLOUDFLARE_TURNSTILE_SITE_KEY:-${CLOUDFLARE_TURNSTILE_SITE_KEY:-}}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      TENOR_API_KEY: ${TENOR_API_KEY:-}
      TENOR_CLIENT_KEY: ${TENOR_CLIENT_KEY:-swebud-local}
      APP_VERSION: ${APP_VERSION:-0.1.2-beta}
      LEGAL_TERMS_URL: ${LEGAL_TERMS_URL:-}
      LEGAL_PRIVACY_URL: ${LEGAL_PRIVACY_URL:-}
    ports:
      - "${FRONTEND_PORT:-9000}:80"

  frontend-dev:
    image: node:22-alpine
    working_dir: /app
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: development
      API_BASE_URL: ${API_BASE_URL:-/api}
      VITE_API_BASE_URL: ${API_BASE_URL:-/api}
      VITE_MAP_STYLE_URL: ${MAP_STYLE_URL:-https://tiles.openfreemap.org/styles/liberty}
      VITE_CLOUDFLARE_TURNSTILE_SITE_KEY: ${VITE_CLOUDFLARE_TURNSTILE_SITE_KEY:-${CLOUDFLARE_TURNSTILE_SITE_KEY:-}}
      VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      VITE_TENOR_API_KEY: ${TENOR_API_KEY:-}
      VITE_TENOR_CLIENT_KEY: ${TENOR_CLIENT_KEY:-swebud-local}
      VITE_APP_VERSION: ${APP_VERSION:-0.1.2-beta}
      VITE_LEGAL_TERMS_URL: ${LEGAL_TERMS_URL:-}
      VITE_LEGAL_PRIVACY_URL: ${LEGAL_PRIVACY_URL:-}
      BACKEND_UPSTREAM: http://backend:3000
      FRONTEND_DEV_PORT: 443
      FRONTEND_HMR_CLIENT_PORT: ${FRONTEND_HTTPS_PORT:-443}
      FRONTEND_HTTPS_KEY_FILE: /app/deployment/certs/swebud.loc.key
      FRONTEND_HTTPS_CERT_FILE: /app/deployment/certs/swebud.loc.crt
      CHOKIDAR_USEPOLLING: "true"
    command: sh -c "npm install && npm run dev"
    ports:
      - "${FRONTEND_HTTPS_PORT:-443}:443"
    volumes:
      - ../../swebud-frontend:/app
      - swebud_frontend_node_modules:/app/node_modules

volumes:
  swebud_postgres_data:
  swebud_uploads:
  swebud_frontend_node_modules:

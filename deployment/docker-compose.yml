services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-swebud}
      POSTGRES_USER: ${POSTGRES_USER:-swebud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD to a strong random value}
    volumes:
      - swebud_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - swebud

  migrate:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL to the application database URL}
      DIRECT_URL: ${DIRECT_URL:?Set DIRECT_URL to a direct migration database URL}
    command: sh -c 'DATABASE_URL="$$DIRECT_URL" npx prisma migrate deploy'
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    networks:
      - swebud

  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL to the application database URL}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET to a strong random value}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET to a different strong random value}
      JWT_ACCESS_TTL_SECONDS: ${JWT_ACCESS_TTL_SECONDS:-900}
      REFRESH_TOKEN_TTL_SECONDS: ${REFRESH_TOKEN_TTL_SECONDS:-604800}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:?Set FRONTEND_ORIGIN to the production frontend origin}
      ADMIN_ORIGIN: ${ADMIN_ORIGIN:-}
      ALLOW_LOCAL_ORIGINS: ${ALLOW_LOCAL_ORIGINS:-false}
      NATIVE_AUTH_ENABLED: ${NATIVE_AUTH_ENABLED:-false}
      NATIVE_APP_ORIGIN: ${NATIVE_APP_ORIGIN:-}
      SMTP_HOST: ${SMTP_HOST:?Set SMTP_HOST to a production SMTP service}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_IGNORE_TLS: ${SMTP_IGNORE_TLS:-false}
      SMTP_REQUIRE_TLS: ${SMTP_REQUIRE_TLS:-true}
      SMTP_TLS_REJECT_UNAUTHORIZED: ${SMTP_TLS_REJECT_UNAUTHORIZED:-true}
      SMTP_IP_FAMILY: ${SMTP_IP_FAMILY:-4}
      SMTP_CONNECTION_TIMEOUT_MS: ${SMTP_CONNECTION_TIMEOUT_MS:-10000}
      SMTP_GREETING_TIMEOUT_MS: ${SMTP_GREETING_TIMEOUT_MS:-10000}
      SMTP_SOCKET_TIMEOUT_MS: ${SMTP_SOCKET_TIMEOUT_MS:-20000}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:?Set MAIL_FROM to a verified production sender}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:3000/auth/google/callback}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-http://localhost:9000/auth/google/callback}
      CLOUDFLARE_TURNSTILE_SECRET_KEY: ${CLOUDFLARE_TURNSTILE_SECRET_KEY:?Set CLOUDFLARE_TURNSTILE_SECRET_KEY to the production secret}
      KLIPY_API_KEY: ${KLIPY_API_KEY:-}
      KLIPY_CLIENT_KEY: ${KLIPY_CLIENT_KEY:-swebud-local}
      MEDIA_STORAGE_DRIVER: ${MEDIA_STORAGE_DRIVER:-local}
      MEDIA_S3_BUCKET: ${MEDIA_S3_BUCKET:-}
      MEDIA_PUBLIC_BASE_URL: ${MEDIA_PUBLIC_BASE_URL:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_ENDPOINT: ${AWS_S3_ENDPOINT:-}
      AWS_S3_FORCE_PATH_STYLE: ${AWS_S3_FORCE_PATH_STYLE:-false}
      STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID:-}
      STRAVA_CLIENT_SECRET: ${STRAVA_CLIENT_SECRET:-}
      STRAVA_WEBHOOK_VERIFY_TOKEN: ${STRAVA_WEBHOOK_VERIFY_TOKEN:-}
      GARMIN_CONSUMER_KEY: ${GARMIN_CONSUMER_KEY:-}
      GARMIN_CONSUMER_SECRET: ${GARMIN_CONSUMER_SECRET:-}
    command: sh -c "mkdir -p uploads/profile-photos uploads/cover-photos uploads/group-photos uploads/chat-photos uploads/actsnaps uploads/posts uploads/comments uploads/images uploads/videos uploads/audio uploads/media && exec node dist/src/main.js"
    init: true
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=128m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 512
    ports:
      - "127.0.0.1:${BACKEND_PORT:-3002}:3000"
    volumes:
      - swebud_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - swebud

networks:
  swebud:
    name: ${SWEBUD_NETWORK:-swebud}
    external: true

volumes:
  swebud_postgres_data:
  swebud_uploads:

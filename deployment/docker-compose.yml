services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-swebud}
      POSTGRES_USER: ${POSTGRES_USER:-swebud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-swebud}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - swebud_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-swebud} -d ${POSTGRES_DB:-swebud}"]
      interval: 5s
      timeout: 5s
      retries: 10

  admin-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${ADMIN_DB_DATABASE:-swebud_admin}
      POSTGRES_USER: ${ADMIN_DB_USERNAME:-swebud_admin}
      POSTGRES_PASSWORD: ${ADMIN_DB_PASSWORD:-swebud_admin}
    ports:
      - "${ADMIN_DB_PORT:-5433}:5432"
    volumes:
      - swebud_admin_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ADMIN_DB_USERNAME:-swebud_admin} -d ${ADMIN_DB_DATABASE:-swebud_admin}"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog:v1.0.1
    restart: unless-stopped
    ports:
      - "${MAILHOG_SMTP_PORT:-1026}:1025"
      - "${MAILHOG_UI_PORT:-8126}:8025"

  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:-postgresql://swebud:swebud@postgres:5432/swebud?schema=public}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET to a strong random value}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET to a different strong random value}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:9000}
      ADMIN_ORIGIN: ${ADMIN_ORIGIN:-http://localhost:9100,http://swebud-admin.loc}
      ALLOW_LOCAL_ORIGINS: ${ALLOW_LOCAL_ORIGINS:-false}
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_IGNORE_TLS: ${SMTP_IGNORE_TLS:-true}
      SMTP_REQUIRE_TLS: ${SMTP_REQUIRE_TLS:-false}
      SMTP_TLS_REJECT_UNAUTHORIZED: ${SMTP_TLS_REJECT_UNAUTHORIZED:-true}
      SMTP_IP_FAMILY: ${SMTP_IP_FAMILY:-4}
      SMTP_CONNECTION_TIMEOUT_MS: ${SMTP_CONNECTION_TIMEOUT_MS:-10000}
      SMTP_GREETING_TIMEOUT_MS: ${SMTP_GREETING_TIMEOUT_MS:-10000}
      SMTP_SOCKET_TIMEOUT_MS: ${SMTP_SOCKET_TIMEOUT_MS:-20000}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-SweBudd <no-reply@localhost>}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:3000/auth/google/callback}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-http://localhost:9000/auth/google/callback}
      CLOUDFLARE_TURNSTILE_SECRET_KEY: ${CLOUDFLARE_TURNSTILE_SECRET_KEY:-}
      CLOUDFLARE_TURNSTILE_SITE_KEY: ${CLOUDFLARE_TURNSTILE_SITE_KEY:-}
      KLIPY_API_KEY: ${KLIPY_API_KEY:-}
      KLIPY_CLIENT_KEY: ${KLIPY_CLIENT_KEY:-swebud-local}
      LEGAL_TERMS_URL: ${LEGAL_TERMS_URL:-}
      LEGAL_PRIVACY_URL: ${LEGAL_PRIVACY_URL:-}
      MEDIA_STORAGE_DRIVER: ${MEDIA_STORAGE_DRIVER:-local}
      MEDIA_S3_BUCKET: ${MEDIA_S3_BUCKET:-}
      MEDIA_PUBLIC_BASE_URL: ${MEDIA_PUBLIC_BASE_URL:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_ENDPOINT: ${AWS_S3_ENDPOINT:-}
      AWS_S3_FORCE_PATH_STYLE: ${AWS_S3_FORCE_PATH_STYLE:-false}
      STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID:-}
      STRAVA_CLIENT_SECRET: ${STRAVA_CLIENT_SECRET:-}
      STRAVA_WEBHOOK_VERIFY_TOKEN: ${STRAVA_WEBHOOK_VERIFY_TOKEN:-}
      GARMIN_CONSUMER_KEY: ${GARMIN_CONSUMER_KEY:-}
      GARMIN_CONSUMER_SECRET: ${GARMIN_CONSUMER_SECRET:-}
    command: sh -c "mkdir -p uploads/profile-photos uploads/cover-photos uploads/group-photos uploads/chat-photos uploads/actsnaps uploads/posts uploads/comments uploads/images uploads/videos uploads/audio uploads/media && exec node dist/src/main.js"
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    volumes:
      - swebud_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  migrate:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://swebud:swebud@postgres:5432/swebud?schema=public}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET to a strong random value}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET to a different strong random value}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:9000}
      ADMIN_ORIGIN: ${ADMIN_ORIGIN:-http://localhost:9100,http://swebud-admin.loc}
      ALLOW_LOCAL_ORIGINS: ${ALLOW_LOCAL_ORIGINS:-false}
    command: sh -c "npx prisma migrate deploy"

  frontend:
    build:
      context: ../../swebud-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${API_BASE_URL:-/api}
        VITE_MAP_STYLE_URL: ${MAP_STYLE_URL:-https://tiles.openfreemap.org/styles/liberty}
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
        VITE_APP_VERSION: ${FRONTEND_APP_VERSION:-0.2.23-beta}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      API_BASE_URL: ${API_BASE_URL:-/api}
      MAP_STYLE_URL: ${MAP_STYLE_URL:-https://tiles.openfreemap.org/styles/liberty}
      BACKEND_UPSTREAM: ${BACKEND_UPSTREAM:-http://backend:3000}
      CLOUDFLARE_TURNSTILE_SITE_KEY: ${VITE_CLOUDFLARE_TURNSTILE_SITE_KEY:-${CLOUDFLARE_TURNSTILE_SITE_KEY:-}}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      KLIPY_CLIENT_KEY: ${KLIPY_CLIENT_KEY:-swebud-local}
      APP_VERSION: ${FRONTEND_APP_VERSION:-0.2.23-beta}
      LEGAL_TERMS_URL: ${LEGAL_TERMS_URL:-}
      LEGAL_PRIVACY_URL: ${LEGAL_PRIVACY_URL:-}
    ports:
      - "${FRONTEND_PORT:-9000}:80"
      - "${FRONTEND_HTTPS_PORT:-9443}:443"

  frontend-dev:
    image: node:22-alpine
    working_dir: /app
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: development
      API_BASE_URL: ${API_BASE_URL:-/api}
      VITE_API_BASE_URL: ${API_BASE_URL:-/api}
      VITE_MAP_STYLE_URL: ${MAP_STYLE_URL:-https://tiles.openfreemap.org/styles/liberty}
      VITE_CLOUDFLARE_TURNSTILE_SITE_KEY: ${VITE_CLOUDFLARE_TURNSTILE_SITE_KEY:-${CLOUDFLARE_TURNSTILE_SITE_KEY:-}}
      VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      VITE_KLIPY_CLIENT_KEY: ${KLIPY_CLIENT_KEY:-swebud-local}
      VITE_APP_VERSION: ${FRONTEND_APP_VERSION:-0.2.23-beta}
      VITE_LEGAL_TERMS_URL: ${LEGAL_TERMS_URL:-}
      VITE_LEGAL_PRIVACY_URL: ${LEGAL_PRIVACY_URL:-}
      BACKEND_UPSTREAM: http://backend:3000
      FRONTEND_DEV_PORT: 9000
      FRONTEND_HMR_HOST: ${FRONTEND_HMR_HOST:-}
      FRONTEND_HMR_CLIENT_PORT: ${FRONTEND_DEV_PORT:-9001}
      CHOKIDAR_USEPOLLING: "true"
    command: sh -c "npm install && npm run dev"
    ports:
      - "${FRONTEND_DEV_PORT:-9001}:9000"
    volumes:
      - ../../swebud-frontend:/app
      - swebud_frontend_node_modules:/app/node_modules

  admin:
    build:
      context: ../../swebud-admin
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      admin-postgres:
        condition: service_healthy
      backend:
        condition: service_healthy
    environment:
      APP_NAME: ${ADMIN_APP_NAME:-SweBudd Admin}
      APP_ENV: ${ADMIN_APP_ENV:-production}
      APP_KEY: ${ADMIN_APP_KEY:?Set ADMIN_APP_KEY to a Laravel app key}
      APP_DEBUG: ${ADMIN_APP_DEBUG:-false}
      APP_URL: ${ADMIN_APP_URL:-http://localhost:${ADMIN_PORT:-9100}}
      DB_CONNECTION: pgsql
      DB_HOST: admin-postgres
      DB_PORT: 5432
      DB_DATABASE: ${ADMIN_DB_DATABASE:-swebud_admin}
      DB_USERNAME: ${ADMIN_DB_USERNAME:-swebud_admin}
      DB_PASSWORD: ${ADMIN_DB_PASSWORD:-swebud_admin}
      SWEBUD_DB_HOST: postgres
      SWEBUD_DB_PORT: 5432
      SWEBUD_DB_DATABASE: ${POSTGRES_DB:-swebud}
      SWEBUD_DB_USERNAME: ${POSTGRES_USER:-swebud}
      SWEBUD_DB_PASSWORD: ${POSTGRES_PASSWORD:-swebud}
      SWEBUD_DB_SCHEMA: public
      SESSION_DRIVER: ${ADMIN_SESSION_DRIVER:-file}
      CACHE_STORE: ${ADMIN_CACHE_STORE:-file}
      QUEUE_CONNECTION: ${ADMIN_QUEUE_CONNECTION:-sync}
      LOG_CHANNEL: ${ADMIN_LOG_CHANNEL:-stderr}
      PORT: 3001
    healthcheck:
      test: ["CMD-SHELL", "php artisan about >/dev/null 2>&1 && php -r \"exit(@file_get_contents('http://127.0.0.1:3001/up') === false ? 1 : 0);\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - "${ADMIN_PORT:-9100}:3001"

volumes:
  swebud_postgres_data:
  swebud_admin_postgres_data:
  swebud_uploads:
  swebud_frontend_node_modules:

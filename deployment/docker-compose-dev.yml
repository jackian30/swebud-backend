services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-swebud}
      POSTGRES_USER: ${POSTGRES_USER:-swebud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD; deploy.sh generates it on first run}
    ports:
      - "${BACKEND_BIND_ADDRESS:-127.0.0.1}:${POSTGRES_PORT:-55432}:5432"
    volumes:
      - swebud_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-swebud} -d ${POSTGRES_DB:-swebud}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - swebud

  mailhog:
    image: mailhog/mailhog:v1.0.1
    restart: unless-stopped
    ports:
      - "${BACKEND_BIND_ADDRESS:-127.0.0.1}:${MAILHOG_SMTP_PORT:-1126}:1025"
      - "${BACKEND_BIND_ADDRESS:-127.0.0.1}:${MAILHOG_UI_PORT:-8126}:8025"
    networks:
      - swebud

  backend:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.dev
      args:
        LOCAL_UID: ${LOCAL_UID:-1000}
        LOCAL_GID: ${LOCAL_GID:-1000}
    working_dir: /app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started
    environment:
      NODE_ENV: development
      PORT: 3000
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL; deploy.sh generates it on first run}
      DIRECT_URL: ${DIRECT_URL:?Set DIRECT_URL; deploy.sh generates it on first run}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET; deploy.sh generates it on first run}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET; deploy.sh generates it on first run}
      JWT_ACCESS_TTL_SECONDS: ${JWT_ACCESS_TTL_SECONDS:-900}
      REFRESH_TOKEN_TTL_SECONDS: ${REFRESH_TOKEN_TTL_SECONDS:-604800}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:9000}
      ADMIN_ORIGIN: ${ADMIN_ORIGIN:-http://localhost:9100,http://swebud-admin.loc}
      ALLOW_LOCAL_ORIGINS: ${ALLOW_LOCAL_ORIGINS:-true}
      NATIVE_AUTH_ENABLED: ${NATIVE_AUTH_ENABLED:-false}
      NATIVE_APP_ORIGIN: ${NATIVE_APP_ORIGIN:-https://localhost}
      LEGACY_NATIVE_AUTH_COMPAT_UNTIL: ${LEGACY_NATIVE_AUTH_COMPAT_UNTIL:-}
      LEGACY_WEB_AUTH_COMPAT_UNTIL: ${LEGACY_WEB_AUTH_COMPAT_UNTIL:-}
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_IGNORE_TLS: ${SMTP_IGNORE_TLS:-true}
      SMTP_REQUIRE_TLS: ${SMTP_REQUIRE_TLS:-false}
      SMTP_TLS_REJECT_UNAUTHORIZED: ${SMTP_TLS_REJECT_UNAUTHORIZED:-true}
      SMTP_IP_FAMILY: ${SMTP_IP_FAMILY:-4}
      SMTP_CONNECTION_TIMEOUT_MS: ${SMTP_CONNECTION_TIMEOUT_MS:-10000}
      SMTP_GREETING_TIMEOUT_MS: ${SMTP_GREETING_TIMEOUT_MS:-10000}
      SMTP_SOCKET_TIMEOUT_MS: ${SMTP_SOCKET_TIMEOUT_MS:-20000}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-SweBudd <no-reply@localhost>}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:3002/auth/google/callback}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-http://localhost:9000/auth/google/callback}
      CLOUDFLARE_TURNSTILE_SECRET_KEY: ${CLOUDFLARE_TURNSTILE_SECRET_KEY:-}
      KLIPY_API_KEY: ${KLIPY_API_KEY:-}
      KLIPY_CLIENT_KEY: ${KLIPY_CLIENT_KEY:-swebud-local}
      MEDIA_STORAGE_DRIVER: ${MEDIA_STORAGE_DRIVER:-local}
      MEDIA_S3_BUCKET: ${MEDIA_S3_BUCKET:-}
      MEDIA_PUBLIC_BASE_URL: ${MEDIA_PUBLIC_BASE_URL:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_ENDPOINT: ${AWS_S3_ENDPOINT:-}
      AWS_S3_FORCE_PATH_STYLE: ${AWS_S3_FORCE_PATH_STYLE:-false}
      STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID:-}
      STRAVA_CLIENT_SECRET: ${STRAVA_CLIENT_SECRET:-}
      STRAVA_WEBHOOK_VERIFY_TOKEN: ${STRAVA_WEBHOOK_VERIFY_TOKEN:-}
      GARMIN_CONSUMER_KEY: ${GARMIN_CONSUMER_KEY:-}
      GARMIN_CONSUMER_SECRET: ${GARMIN_CONSUMER_SECRET:-}
    command: >
      sh -c "npm ci &&
      npx prisma generate &&
      DATABASE_URL=\"$${DIRECT_URL}\" npm run prisma:deploy &&
      mkdir -p uploads/profile-photos uploads/cover-photos uploads/group-photos uploads/chat-photos uploads/actsnaps uploads/posts uploads/comments uploads/images uploads/videos uploads/audio uploads/media &&
      npm run dev"
    ports:
      - "${BACKEND_BIND_ADDRESS:-127.0.0.1}:${BACKEND_PORT:-3002}:3000"
    volumes:
      - ..:/app
      - swebud_backend_node_modules:/app/node_modules
      - swebud_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - swebud

networks:
  swebud:
    name: ${SWEBUD_NETWORK:-swebud}
    external: true

volumes:
  swebud_postgres_data:
  swebud_backend_node_modules:
  swebud_uploads:

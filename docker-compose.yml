services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: swebud
      POSTGRES_PASSWORD: swebud
      POSTGRES_DB: swebud
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swebud -d swebud"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://swebud:swebud@db:5432/swebud?schema=public
      PORT: 3000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
